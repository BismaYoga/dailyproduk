<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyProduk</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ee4d2d;
            --primary-hover: #d73a1e;
            --bg-color: #f5f5f5;
            --text-color: #333;
            --text-muted: #757575;
        }
        body { 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            padding: 0; 
            background: var(--bg-color); 
            color: var(--text-color);
        }
        .header {
            background: linear-gradient(-180deg, #f53d2d, #f63);
            padding: 16px 20px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            max-width: 1200px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        @media (min-width: 768px) {
            .header-content {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
        }
        .brand {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: lowercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-box { 
            display: flex;
            width: 100%;
            max-width: 600px;
            background: white; 
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .search-box input { 
            padding: 10px 14px; 
            flex-grow: 1; 
            border: none; 
            outline: none; 
            font-size: 14px;
            font-family: inherit;
        }
        .search-box button.btn-search { 
            padding: 0 20px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .search-box button.btn-search:hover {
            background: var(--primary-hover);
        }
        .search-box button.btn-reset {
            padding: 0 15px;
            background: #fff;
            color: var(--text-muted);
            border: none;
            border-left: 1px solid #eee;
            cursor: pointer;
            font-size: 14px;
        }
        .search-box button.btn-reset:hover {
            background: #fdfdfd;
            color: #333;
        }

        .container { 
            max-width: 480px; /* Mobile focused max width */
            margin: 0 auto; 
            padding: 10px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 0;
            color: var(--text-color);
            text-transform: uppercase;
            padding: 10px 0;
        }
        .title-wrapper {
            background: transparent;
            padding: 0 5px;
            margin-bottom: 10px;
            box-shadow: none;
            display: flex;
            align-items: center;
            border-bottom: 2px solid var(--primary);
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* 2 columns exactly for mobile */
            gap: 8px; /* tight spacing like shopee */
        }
        @media (min-width: 500px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
            .container { max-width: 768px; }
        }
        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
            .container { max-width: 1024px; }
        }

        .card { 
            background: white; 
            border-radius: 2px; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            text-decoration: none;
            color: inherit;
            position: relative;
            transition: transform 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }
        .card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 2px 6px rgba(0,0,0,0.1); 
            z-index: 2;
        }
        .card img { 
            width: 100%; 
            aspect-ratio: 1/1; 
            object-fit: cover; 
            background: #f0f0f0;
        }
        .card-body {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }
        .card h3 { 
            font-size: 12px; 
            margin: 0; 
            font-weight: 400;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }
        @media (min-width: 576px) {
            .card h3 { font-size: 14px; }
        }
        .price-row {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price { 
            color: var(--primary); 
            font-size: 14px; 
            font-weight: 500; 
            margin: 0;
        }
        .code { 
            font-size: 10px; 
            color: #fff; 
            background: rgba(0,0,0,0.5); 
            padding: 3px 6px; 
            border-radius: 2px;
            position: absolute;
            top: 5px;
            right: 5px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            color: var(--text-muted);
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                dailyproduk
            </div>
            <div class="search-box">
                <input type="number" id="q" placeholder="Cari berdasarkan kode angka..." onkeypress="handleKeyPress(event)">
                <button class="btn-search" onclick="loadKatalog(document.getElementById('q').value)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
                <button class="btn-reset" onclick="resetSearch()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="title-wrapper">
            <h2 class="section-title" id="sectionTitle">Semua Produk</h2>
        </div>
        <div id="katalogGrid" class="grid">
            <div class="empty-state">Memuat data produk...</div>
        </div>
    </div>

    <script>
        function formatPrice(price) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(price);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                loadKatalog(document.getElementById('q').value);
            }
        }

        function resetSearch() {
            document.getElementById('q').value = '';
            loadKatalog('');
        }

        async function loadKatalog(query = '') {
            const grid = document.getElementById('katalogGrid');
            const sectionTitle = document.getElementById('sectionTitle');
            
            grid.innerHTML = '<div class="empty-state">Memuat data produk...</div>';
            
            try {
                const res = await fetch(`/api/produk?q=${query}`);
                const data = await res.json();
                
                if(query) {
                    sectionTitle.innerText = `Hasil Pencarian: ${query}`;
                } else {
                    sectionTitle.innerText = "Semua Produk";
                }

                if(data.length === 0) {
                    grid.innerHTML = `<div class="empty-state">
                        <p>Produk tidak ditemukan.</p>
                    </div>`;
                    return;
                }

                grid.innerHTML = data.map(item => {
                    const fallbackLink = item.url_shopee || item.url_gambar;
                    // Provide a generic shopee image if microlink failed
                    const imgSrc = item.url_gambar && item.url_gambar.startsWith('http') && item.url_gambar !== fallbackLink 
                        ? item.url_gambar 
                        : 'https://down-id.img.susercontent.com/file/sg-11134004-7rdxl-m0e9y5y65e0lca';
                        
                    return `
                    <a href="${fallbackLink}" target="_blank" rel="noopener noreferrer" class="card" style="text-decoration: none;">
                        <span class="code">#${item.kode}</span>
                        <img src="${imgSrc}" onerror="this.src='https://placehold.co/300x300/f0f0f0/999?text=Tidak+Ada+Gambar'" alt="${item.nama}">
                        <div class="card-body">
                            <h3>${item.nama}</h3>
                            <div class="price-row">
                                <p class="price">${formatPrice(item.harga)}</p>
                            </div>
                        </div>
                    </a>
                `}).join('');
            } catch (err) {
                grid.innerHTML = `<div class="empty-state">Gagal memuat produk. Silakan coba lagi.</div>`;
            }
        }

        // Load all products on init
        loadKatalog();
    </script>
</body>
</html>
